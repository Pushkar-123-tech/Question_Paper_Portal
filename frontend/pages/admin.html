<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Admin Panel - User Management</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="/public/ui.css">
<style>
  :root { --primary: #7b0000; --bg: #f4f6f8; --card: #fff; }
  body { background: var(--bg); font-family: sans-serif; padding: 20px; }
  .container { max-width: 1000px; margin: 0 auto; background: var(--card); padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
  h1 { color: var(--primary); margin-bottom: 20px; }
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
  th { background: #f8f9fa; }
  .role-select { padding: 6px; border-radius: 4px; border: 1px solid #ccc; }
  .btn-danger { background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
  .back-btn { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--primary); font-weight: bold; }
</style>
</head>
<body>
<div class="container">
  <a href="/dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
  <h1>User Management</h1>
  <div id="usersList">Loading users...</div>
</div>

<script src="/public/ui.js"></script>
<script>
  const token = localStorage.getItem('token');
  if (!token) window.location.href = '/login.html';

  async function loadUsers() {
    try {
      const res = await fetch('/api/admin/users', { headers: { 'Authorization': 'Bearer ' + token } });
      if (!res.ok) throw new Error('Failed to load users');
      const data = await res.json();
      renderUsers(data.users);
    } catch (err) {
      showToast(err.message, 'error');
    }
  }

  function renderUsers(users) {
    const container = document.getElementById('usersList');
    if (!users.length) { container.innerHTML = 'No users found.'; return; }
    
    let html = `<table>
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>`;
    
    users.forEach(u => {
      html += `<tr>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>
          <select class="role-select" onchange="updateRole('${u._id}', this.value)">
            <option value="teacher" ${u.role==='teacher'?'selected':''}>Teacher</option>
            <option value="faculty" ${u.role==='faculty'?'selected':''}>Faculty</option>
            <option value="chairman" ${u.role==='chairman'?'selected':''}>Chairman</option>
            <option value="module_coordinator" ${u.role==='module_coordinator'?'selected':''}>Module Coordinator</option>
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
          </select>
        </td>
        <td>
          <button class="btn-danger" onclick="deleteUser('${u._id}')">Delete</button>
        </td>
      </tr>`;
    });
    
    html += `</tbody></table>`;
    container.innerHTML = html;
  }

  async function updateRole(userId, newRole) {
    try {
      const res = await fetch(`/api/admin/users/${userId}/role`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ role: newRole })
      });
      if (!res.ok) throw new Error('Update failed');
      showToast('Role updated', 'success');
    } catch (err) { showToast(err.message, 'error'); }
  }

  async function deleteUser(userId) {
    if (!confirm('Are you sure you want to delete this user?')) return;
    try {
      const res = await fetch(`/api/admin/users/${userId}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) throw new Error('Delete failed');
      showToast('User deleted', 'success');
      loadUsers();
    } catch (err) { showToast(err.message, 'error'); }
  }

  loadUsers();
</script>
</body>
</html>
