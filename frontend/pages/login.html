<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login & Signup</title>

<style>
  :root {
    --primary: #7b0000;
    --bg: #f4f6f8;
    --card: #fff;
    --text: #111;
    --muted: #555;
    --border: #7b0000;
  }
  * {
    margin:0; padding:0; box-sizing:border-box;
    font-family:Segoe UI, system-ui, sans-serif;
  }
  body {
    background:var(--bg);
    height:100vh; display:flex; justify-content:center; align-items:center;
  }
  .container {
    width:360px; background:var(--card); padding:22px;
    border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,0.1);
    border-top:4px solid var(--primary);
  }
  h2 { text-align:center; margin-bottom:18px; font-size:22px; }
  .input-box { margin-bottom:14px; }
  .input-box input {
    width:100%; padding:12px; border:2px solid var(--border);
    border-radius:10px; font-size:15px; outline:none;
  }
  .btn {
    width:100%; padding:12px; background:var(--primary); border:none;
    border-radius:10px; color:white; font-size:16px; cursor:pointer;
    margin-top:6px;
  }
  .toggle {
    text-align:center; margin-top:14px; font-size:14px; color:var(--muted);
  }
  .toggle span { color:var(--primary); cursor:pointer; font-weight:600; }
  form { display:none; }
  form.active { display:block; }
</style>
<link rel="stylesheet" href="/public/ui.css">
</head>
<body>

  <div class="container">
    <!-- LOGIN FORM -->
    <form id="loginForm" class="active">
      <h2>Login</h2>
      <div class="input-box"><input id="loginEmail" type="email" placeholder="Enter Email" required></div>
      <div class="input-box"><input id="loginPassword" type="password" placeholder="Enter Password" required></div>
      <button type="submit" class="btn">Login</button>
      <p style="text-align:center; margin-top:15px; font-size:12px; color:#666;">Only authorized personnel can login.</p>
    </form>
  </div>

  <script>
    const loginForm = document.getElementById("loginForm");

    // AUTH
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (!res.ok) { showToast(data.message || 'Login failed', 'error'); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('userName', data.user.name);
        localStorage.setItem('userEmail', data.user.email || email);
        localStorage.setItem('userRole', data.user.role);
        showToast('Logged in', 'success');
        
        if (data.user.role === 'admin') {
            window.location.href = '/admin.html';
        } else if (data.user.role === 'external') {
            window.location.href = '/externalhome.html';
        } else {
            window.location.href = '/dashboard.html';
        }
      } catch (err) { console.error(err); showToast('Network error', 'error'); }
    });
  </script>

<script src="/public/ui.js"></script>
</body>
</html>
