<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login & Signup</title>

<style>
  :root {
    --primary: #7b0000;
    --bg: #f4f6f8;
    --card: #fff;
    --text: #111;
    --muted: #555;
    --border: #7b0000;
  }
  * {
    margin:0; padding:0; box-sizing:border-box;
    font-family:Segoe UI, system-ui, sans-serif;
  }
  body {
    background:var(--bg);
    height:100vh; display:flex; justify-content:center; align-items:center;
  }
  .container {
    width:360px; background:var(--card); padding:22px;
    border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,0.1);
    border-top:4px solid var(--primary);
  }
  h2 { text-align:center; margin-bottom:18px; font-size:22px; }
  .input-box { margin-bottom:14px; }
  .input-box input {
    width:100%; padding:12px; border:2px solid var(--border);
    border-radius:10px; font-size:15px; outline:none;
  }
  .btn {
    width:100%; padding:12px; background:var(--primary); border:none;
    border-radius:10px; color:white; font-size:16px; cursor:pointer;
    margin-top:6px;
  }
  .toggle {
    text-align:center; margin-top:14px; font-size:14px; color:var(--muted);
  }
  .toggle span { color:var(--primary); cursor:pointer; font-weight:600; }
  form { display:none; }
  form.active { display:block; }
</style>
<link rel="stylesheet" href="/public/ui.css">
</head>
<body>

<div class="container">
  <!-- LOGIN FORM -->
  <form id="loginForm" class="active active">
    <h2>Login</h2>
    <div class="input-box"><input id="loginEmail" type="email" placeholder="Enter Email" required></div>
    <div class="input-box"><input id="loginPassword" type="password" placeholder="Enter Password" required></div>
    <button type="submit" class="btn">Login</button>
    <p class="toggle">Don't have an account? <span onclick="showSignup()">Sign up</span></p>
  </form>

  <!-- SIGNUP FORM -->
  <form id="signupForm">
    <h2>Sign Up</h2>
    <div class="input-box"><input id="signupName" type="text" placeholder="Enter Full Name" required></div>
    <div class="input-box"><input id="signupEmail" type="email" placeholder="Enter Email" required></div>
    <div class="input-box"><input id="signupMobile" type="text" placeholder="Enter Mobile Number" maxlength="10" required></div>
    <div class="input-box"><input id="signupPassword" type="password" placeholder="Create Password (min 6 chars)" minlength="6" required></div>
      <div class="input-box">
        <select id="signupRole" style="width:100%; padding:12px; border:2px solid var(--border); border-radius:10px; font-size:15px; outline:none; background:white;">
          <option value="teacher">Teacher</option>
          <option value="faculty">Faculty</option>
          <option value="chairman">Chairman</option>
          <option value="module_coordinator">Module Coordinator</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <button type="submit" class="btn">Create Account</button>
    <p class="toggle">Already have an account? <span onclick="showLogin()">Login</span></p>
  </form>
</div>

<script>
  const loginForm = document.getElementById("loginForm");
  const signupForm = document.getElementById("signupForm");

  function showSignup() {
    loginForm.classList.remove("active");
    signupForm.classList.add("active");
  }
  function showLogin() {
    signupForm.classList.remove("active");
    loginForm.classList.add("active");
  }

  // AUTH
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.message || 'Login failed', 'error'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('userName', data.user.name);
      localStorage.setItem('userEmail', data.user.email || email);
      showToast('Logged in', 'success');
      // continue to dashboard
      window.location.href = '/dashboard.html';
    } catch (err) { console.error(err); showToast('Network error', 'error'); }
  });

    signupForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('signupName').value.trim();
      const email = document.getElementById('signupEmail').value.trim();
      const password = document.getElementById('signupPassword').value;
      const role = document.getElementById('signupRole').value;
      try {
        const res = await fetch('/api/auth/signup', {
          method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ name, email, password, role })
        });
      const data = await res.json();
      if (!res.ok) { showToast(data.message || 'Signup failed', 'error'); return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('userName', data.user.name);
      localStorage.setItem('userEmail', data.user.email || email);
      showToast('Account created', 'success');
      window.location.href = '/dashboard.html';
    } catch (err) { console.error(err); showToast('Network error', 'error'); }
  });
</script>
<script src="/public/ui.js"></script>
</body>
</html>
