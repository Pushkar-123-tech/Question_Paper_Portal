<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password</title>

<style>
  :root {
    --primary: #7b0000;
    --bg: #f4f6f8;
    --card: #fff;
    --text: #111;
    --muted: #555;
    --border: #7b0000;
  }
  * {
    margin:0; padding:0; box-sizing:border-box;
    font-family:Segoe UI, system-ui, sans-serif;
  }
  body {
    background:var(--bg);
    height:100vh; display:flex; justify-content:center; align-items:center;
  }
  .container {
    width:360px; background:var(--card); padding:22px;
    border-radius:16px; box-shadow:0 4px 14px rgba(0,0,0,0.1);
    border-top:4px solid var(--primary);
  }
  h2 { text-align:center; margin-bottom:18px; font-size:22px; }
  .input-box { margin-bottom:14px; }
  .input-box input {
    width:100%; padding:12px; border:2px solid var(--border);
    border-radius:10px; font-size:15px; outline:none;
  }
  .btn {
    width:100%; padding:12px; background:var(--primary); border:none;
    border-radius:10px; color:white; font-size:16px; cursor:pointer;
    margin-top:6px;
  }
  .toggle {
    text-align:center; margin-top:14px; font-size:14px; color:var(--muted);
  }
  .toggle span { color:var(--primary); cursor:pointer; font-weight:600; }
  
  /* MOBILE RESPONSIVE */
  @media (max-width:768px) {
    body { padding:16px; height:auto; min-height:100vh; }
    .container { width:100%; max-width:100%; padding:18px; }
  }
</style>
<link rel="stylesheet" href="/public/ui.css">
</head>
<body>

  <div class="container">
    <form id="resetForm">
      <h2>Reset Password</h2>
      <div class="input-box"><input id="newPassword" type="password" placeholder="New Password" required></div>
      <div class="input-box"><input id="confirmPassword" type="password" placeholder="Confirm Password" required></div>
      <button type="submit" class="btn">Set New Password</button>
      <div class="toggle">
        <span onclick="window.location.href='/login.html'">Back to Login</span>
      </div>
    </form>
  </div>

  <script src="/public/ui.js"></script>
  <script>
    // Parse token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.body.innerHTML = '<div style="text-align:center; padding:20px;"><h2>Invalid Link</h2><p>Missing reset token.</p><a href="/login.html">Go to Login</a></div>';
    }

    const resetForm = document.getElementById("resetForm");

    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('newPassword').value;
      const confirm = document.getElementById('confirmPassword').value;

      if (password !== confirm) {
        return showToast('Passwords do not match', 'error');
      }

      if (password.length < 6) {
        return showToast('Password must be at least 6 characters', 'error');
      }

      const btn = resetForm.querySelector('button');
      const originalText = btn.innerText;
      btn.innerText = 'Resetting...';
      btn.disabled = true;

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST', 
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        
        if (!res.ok) { 
          showToast(data.message || 'Reset failed', 'error'); 
          btn.innerText = originalText;
          btn.disabled = false;
          return; 
        }

        showToast('Password reset successful', 'success');
        setTimeout(() => {
          window.location.href = '/login.html';
        }, 2000);
        
      } catch (err) { 
        console.error(err); 
        showToast('Network error', 'error'); 
        btn.innerText = originalText;
        btn.disabled = false;
      }
    });
  </script>
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
